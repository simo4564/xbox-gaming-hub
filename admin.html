<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaming Community Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm uppercase tracking-[0.25em] text-green-500">Admin dashboard</p>
        <h1 class="text-3xl font-bold">Gaming Community Control Panel</h1>
      </div>
      <a href="index.html" class="rounded-lg border border-white/10 px-4 py-2 text-sm hover:bg-white/5">Back to storefront</a>
    </div>

    <div id="login-card" class="max-w-md rounded-2xl border border-white/10 bg-neutral-900 p-6 shadow-2xl">
      <h2 class="text-xl font-semibold mb-4">Admin sign in</h2>
      <form id="login-form" class="space-y-4">
        <input id="email" type="email" placeholder="Admin email" class="w-full rounded-lg bg-neutral-950 border border-white/10 px-4 py-3" required />
        <input id="password" type="password" placeholder="Password" class="w-full rounded-lg bg-neutral-950 border border-white/10 px-4 py-3" required />
        <button class="w-full rounded-lg bg-green-600 hover:bg-green-500 px-4 py-3 font-semibold">Sign in</button>
      </form>
      <p id="login-status" class="mt-3 text-sm text-neutral-400"></p>
    </div>

    <div id="dashboard" class="hidden space-y-8">
      <div class="grid gap-4 md:grid-cols-4">
        <div class="rounded-2xl border border-white/10 bg-neutral-900 p-5"><p class="text-sm text-neutral-400">Products</p><p id="stat-products" class="text-3xl font-bold mt-2">0</p></div>
        <div class="rounded-2xl border border-white/10 bg-neutral-900 p-5"><p class="text-sm text-neutral-400">Orders</p><p id="stat-orders" class="text-3xl font-bold mt-2">0</p></div>
        <div class="rounded-2xl border border-white/10 bg-neutral-900 p-5"><p class="text-sm text-neutral-400">Subscribers</p><p id="stat-subscribers" class="text-3xl font-bold mt-2">0</p></div>
        <div class="rounded-2xl border border-white/10 bg-neutral-900 p-5"><p class="text-sm text-neutral-400">Contacts</p><p id="stat-contacts" class="text-3xl font-bold mt-2">0</p></div>
      </div>

      <section class="rounded-2xl border border-white/10 bg-neutral-900 p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Recent orders</h2>
          <button id="logout-btn" class="rounded-lg border border-white/10 px-4 py-2 text-sm hover:bg-white/5">Log out</button>
        </div>
        <div id="orders-wrap" class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead class="text-left text-neutral-400"><tr><th class="py-2 pr-4">Reference</th><th class="py-2 pr-4">Customer</th><th class="py-2 pr-4">Total</th><th class="py-2 pr-4">Status</th><th class="py-2">Created</th></tr></thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>

      <div class="grid gap-6 md:grid-cols-2">
        <section class="rounded-2xl border border-white/10 bg-neutral-900 p-6">
          <h2 class="text-xl font-semibold mb-4">Newsletter subscribers</h2>
          <ul id="subscriber-list" class="space-y-2 text-sm text-neutral-300"></ul>
        </section>
        <section class="rounded-2xl border border-white/10 bg-neutral-900 p-6">
          <h2 class="text-xl font-semibold mb-4">Contact messages</h2>
          <ul id="contact-list" class="space-y-3 text-sm text-neutral-300"></ul>
        </section>
      </div>
    </div>
  </div>

  <script>
    const tokenKey = 'gc_admin_token';
    const apiBase = './api';
    const loginCard = document.getElementById('login-card');
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('login-status');

    function getToken() { return localStorage.getItem(tokenKey); }
    function setToken(token) { localStorage.setItem(tokenKey, token); }
    function clearToken() { localStorage.removeItem(tokenKey); }

    async function api(path) {
      const res = await fetch(apiBase + path, { headers: { Authorization: `Bearer ${getToken()}` } });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadDashboard() {
      try {
        const [statsRes, ordersRes, subsRes, contactsRes] = await Promise.all([
          api('/admin/stats'), api('/admin/orders'), api('/admin/newsletter'), api('/admin/contacts')
        ]);
        document.getElementById('stat-products').textContent = statsRes.stats.products;
        document.getElementById('stat-orders').textContent = statsRes.stats.orders;
        document.getElementById('stat-subscribers').textContent = statsRes.stats.newsletterSubscribers;
        document.getElementById('stat-contacts').textContent = statsRes.stats.contactMessages;
        document.getElementById('orders-body').innerHTML = ordersRes.orders.map(order => `
          <tr class="border-t border-white/10"><td class="py-3 pr-4 font-medium">${order.order_reference}</td><td class="py-3 pr-4">${order.customer_name || order.delivery_email || 'Guest'}</td><td class="py-3 pr-4">${order.currency} ${Number(order.total).toFixed(2)}</td><td class="py-3 pr-4">${order.status}</td><td class="py-3">${new Date(order.created_at).toLocaleString()}</td></tr>
        `).join('');
        document.getElementById('subscriber-list').innerHTML = subsRes.subscribers.map(item => `<li class="border-b border-white/5 pb-2">${item.email} <span class="text-neutral-500">• ${new Date(item.created_at).toLocaleString()}</span></li>`).join('') || '<li class="text-neutral-500">No subscribers yet.</li>';
        document.getElementById('contact-list').innerHTML = contactsRes.messages.map(item => `<li class="border-b border-white/5 pb-3"><p class="font-medium">${item.name} • ${item.email}</p><p class="text-neutral-400 mt-1">${item.message}</p></li>`).join('') || '<li class="text-neutral-500">No contact messages yet.</li>';
        loginCard.classList.add('hidden');
        dashboard.classList.remove('hidden');
      } catch (err) {
        clearToken();
        loginCard.classList.remove('hidden');
        dashboard.classList.add('hidden');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'Signing in…';
      const payload = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      };
      const res = await fetch(apiBase + '/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        statusEl.textContent = data.detail || 'Login failed';
        return;
      }
      setToken(data.token);
      statusEl.textContent = 'Login successful.';
      loadDashboard();
    });

    document.getElementById('logout-btn').addEventListener('click', () => { clearToken(); loadDashboard(); });

    if (getToken()) loadDashboard();
  </script>
</body>
</html>
